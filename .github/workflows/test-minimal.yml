name: Vibe Code Runner

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
        type: string
      repo:
        description: 'Target repo'
        required: true
        type: string
      branch:
        description: 'Target branch'
        required: false
        type: string
        default: 'main'
      prompt:
        description: 'Coding task'
        required: true
        type: string
      model:
        description: 'DeepSeek model'
        required: false
        type: string
        default: 'deepseek-v4-flash'
      clear_history:
        description: 'Clear chat history'
        required: false
        type: string
        default: 'false'
      callback_url:
        description: 'Worker callback URL'
        required: true
        type: string
      callback_secret:
        description: 'Worker secret'
        required: true
        type: string

jobs:
  vibe-code:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Clone target repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone --branch "${{ inputs.branch }}" --single-branch \
            "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" /tmp/target-repo
          ls /tmp/target-repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider
        run: pip install aider-chat

      - name: Clear history
        if: inputs.clear_history == 'true'
        run: |
          cd /tmp/target-repo
          rm -f .aider.chat.history.md .aider.input.history
