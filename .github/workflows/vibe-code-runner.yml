name: Vibe Code Runner
on:
  workflow_dispatch:
    inputs:
      job_id: {description: 'Job ID', required: true, type: string}
      repo: {description: 'Target repo', required: true, type: string}
      branch: {description: 'Target branch', required: false, type: string, default: 'main'}
      prompt: {description: 'Coding task', required: true, type: string}
      model: {description: 'DeepSeek model', required: false, type: string, default: 'deepseek-v4-flash'}
      clear_history: {description: 'Clear chat history', required: false, type: string, default: 'false'}
      callback_url: {description: 'Worker callback URL', required: true, type: string}
      callback_secret: {description: 'Worker secret', required: true, type: string}

jobs:
  vibe-code:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Clone target repo
        env: {GH_PAT: '${{ secrets.GH_PAT }}'}
        run: |
          git clone --branch "${{ inputs.branch }}" --single-branch \
            "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" /tmp/target-repo
          ls /tmp/target-repo

      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Install Aider
        run: pip install aider-chat

      - name: Clear history
        if: inputs.clear_history == 'true'
        run: |
          cd /tmp/target-repo
          rm -f .aider.chat.history.md .aider.input.history

      - name: Web Search
        run: |
          QUERY="${{ inputs.prompt }}"
          echo "=== WEB SEARCH ==="
          TKEY="${{ secrets.TAVILY_API_KEY }}"
          if [ -n "$TKEY" ]; then
            curl -s -X POST "https://api.tavily.com/search" -H "Content-Type: application/json" \
              -d "{\"api_key\":\"$TKEY\",\"query\":\"${QUERY}\",\"search_depth\":\"basic\",\"max_results\":5}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); [print(r['title'],r['url'],r.get('content','')[:200],sep='\n',end='\n\n') for r in d.get('results',[])]" \
              > /tmp/web-results.txt 2>/dev/null
          fi
          if [ ! -s /tmp/web-results.txt ]; then
            ENC_Q=$(echo "$QUERY" | python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read()[:200]))")
            curl -sL "https://html.duckduckgo.com/html/?q=${ENC_Q}" -H "User-Agent: vibe-code-bot/1.0" \
              | grep -oP '<a[^>]*class="result__a"[^>]*href="[^"]*"[^>]*>[^<]+</a>' | head -5 > /tmp/web-results.txt 2>/dev/null
          fi
          echo "=== RESULTS ==="
          cat /tmp/web-results.txt 2>/dev/null || echo "(none)"

      - name: Notify Started
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"started\",\"message\":\"Aider (${{ inputs.model }}) starting...\"}" || true

      - name: Run Aider
        env:
          OPENAI_API_BASE: https://api.deepseek.com/v1
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_MAX_TOKENS: 384000
        run: |
          cd /tmp/target-repo

          # Set DeepSeek V4 context (1M input, 384K output)
          cat > .aider.model.metadata.json << 'METAEOF'
          {
            "openai/deepseek-v4-flash": {
              "max_tokens": 1000000,
              "max_input_tokens": 1000000,
              "max_output_tokens": 384000,
              "mode": "chat"
            },
            "openai/deepseek-v4-pro": {
              "max_tokens": 1000000,
              "max_input_tokens": 1000000,
              "max_output_tokens": 384000,
              "mode": "chat"
            },
            "openai/deepseek-chat": {
              "max_tokens": 1000000,
              "max_input_tokens": 1000000,
              "max_output_tokens": 384000,
              "mode": "chat"
            },
            "openai/deepseek-reasoner": {
              "max_tokens": 1000000,
              "max_input_tokens": 1000000,
              "max_output_tokens": 384000,
              "mode": "chat"
            }
          }
          METAEOF
          echo "Model: openai/${{ inputs.model }} | Context: 1M in / 384K out"

          aider --yes-always --model "openai/${{ inputs.model }}" \
            --message "${{ inputs.prompt }}" --no-suggest-shell-commands \
            --model-metadata-file .aider.model.metadata.json \
            > /tmp/aider.log 2>/tmp/aider-err.log
          AIDER_EXIT=${PIPESTATUS[0]}
          echo "Aider exit: ${AIDER_EXIT}"

          # Generate AI summary of changes (DeepSeek direct call)
          echo "=== GENERATING SUMMARY ==="
          DIFF_CONTENT=$(git diff --staged 2>/dev/null | head -100 || git diff 2>/dev/null | head -100)
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null | head -1)
          if [ -n "$DIFF_CONTENT" ]; then
            SUMMARY_PROMPT="Based on this git diff, write a 2-3 sentence summary of what was changed. Be specific about files, functions, and features. Diff: $DIFF_CONTENT"
            AI_SUMMARY=$(curl -s https://api.deepseek.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
              -d "{\"model\":\"${{ inputs.model }}\",\"messages\":[{\"role\":\"user\",\"content\":\"$SUMMARY_PROMPT\"}],\"max_tokens\":200,\"temperature\":0.3}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'][:500])" 2>/dev/null)
            echo "$AI_SUMMARY" > /tmp/ai-summary.txt
            echo "Summary: $AI_SUMMARY"
            # Send summary as progress
            curl -s -X POST "$CB" -H "Authorization: Bearer $CS" -H "Content-Type: application/json" \
              -d "{\"type\":\"progress\",\"message\":\"🤖 AI Summary: $AI_SUMMARY\"}" > /dev/null 2>&1 || true
          fi

          # Send filtered progress: only meaningful Aider lines
          CB="${{ inputs.callback_url }}"; CS="${{ inputs.callback_secret }}"
          grep -vE '^(Downloading|Collecting|Installing|Successfully|Requirement|  ━|^$|oll|nstalling|ownloading|uccessfully|OPENAI|COMMIT_MSG|SUMMARY_PROMPT|curl |echo |grep |while |line=|head |tail |python|CB=|CS=|cat |cut |\[3|\[0)' /tmp/aider.log | \
          grep -vE '(pip install|setup.py|wheel|model-metadata|--yes|--message|--model|aider-chat|Running setup|Building wheel)' | \
          grep -vE '^\s*$' | \
          grep -E '(Creating|Created|Applied|Edited|Modified|Wrote|Commit|commit|Token|error|Error|Failed|scraping|repo-map|plan|ANSWER|summar|Applied|Asked|Added|Removed)' | \
          head -20 | while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\n\r' | cut -c1-500)
            curl -s -X POST "$CB" -H "Authorization: Bearer $CS" -H "Content-Type: application/json" \
              -d "{\"type\":\"progress\",\"message\":\"$line\"}" > /dev/null 2>&1 || true
          done

          # Send diff + changed files summary
          echo "--- What Changed ---"
          git diff --stat 2>/dev/null
          FILES=$(git diff --name-only 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
          ADDS=$(git diff --shortstat 2>/dev/null | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            curl -s -X POST "$CB" -H "Authorization: Bearer $CS" -H "Content-Type: application/json" \
              -d "{\"type\":\"progress\",\"message\":\"📁 Changed: $FILES\"}" > /dev/null 2>&1 || true
          fi
          if [ -n "$ADDS" ]; then
            curl -s -X POST "$CB" -H "Authorization: Bearer $CS" -H "Content-Type: application/json" \
              -d "{\"type\":\"progress\",\"message\":\"📊 $ADDS\"}" > /dev/null 2>&1 || true
          fi

          [ ${AIDER_EXIT} -ne 0 ] && exit ${AIDER_EXIT}
          if ! grep -qE '(Applied|Created|Modified|Wrote|Edited)' /tmp/aider.log /tmp/aider-err.log 2>/dev/null; then
            echo "Aider produced no changes (checking both stdout+stderr)"
            cat /tmp/aider-err.log | tail -20
            exit 1
          fi

      - name: Check changes
        id: changes
        run: |
          cd /tmp/target-repo
          CHANGES=$(git status --porcelain | wc -l)
          echo "changes_count=${CHANGES}" >> $GITHUB_OUTPUT
          [ "${CHANGES}" -gt 0 ] && git diff --stat

      - name: Push changes
        if: steps.changes.outputs.changes_count > 0
        id: commit
        env: {GH_PAT: '${{ secrets.GH_PAT }}'}
        run: |
          cd /tmp/target-repo
          B="vibe-code/job-${{ inputs.job_id }}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$B"
          git config user.name "Vibe Code Bot"
          git config user.email "vibe-code-bot@users.noreply.github.com"
          git add -A
          git commit -m "Aider: ${{ inputs.prompt }}" || echo "(no changes)"
          git push "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" "$B"
          echo "branch_name=$B" >> $GITHUB_OUTPUT

      - name: Live Preview
        id: preview
        continue-on-error: true
        run: |
          cd /tmp/target-repo
          npm install -g serve 2>/dev/null || true
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared; PORT=8080
          nohup serve -l $PORT -s . > /tmp/srv.log 2>&1 &; sleep 3
          ./cloudflared tunnel --url http://localhost:$PORT > /tmp/tun.log 2>&1 &; sleep 6
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tun.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then echo "preview_url=$TUNNEL_URL" >> $GITHUB_OUTPUT; echo "LIVE: $TUNNEL_URL"
          else echo "preview_url=" >> $GITHUB_OUTPUT; fi

      - name: Create PR
        if: steps.changes.outputs.changes_count > 0
        id: pr
        env: {GH_TOKEN: '${{ secrets.GH_PAT }}'}
        run: |
          cd /tmp/target-repo
          BODY="## Aider + DeepSeek\n\n**Prompt:** ${{ inputs.prompt }}"
          PV="${{ steps.preview.outputs.preview_url }}"
          [ -n "$PV" ] && BODY="${BODY}\n\n**Preview:** ${PV}"
          PR_URL=$(gh pr create --repo "${{ inputs.repo }}" --head "${{ steps.commit.outputs.branch_name }}" --base "${{ inputs.branch }}" --title "Aider: ${{ inputs.prompt }}" --body "$(echo -e "${BODY}")" 2>&1)
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Notify Done
        if: success()
        run: |
          cd /tmp/target-repo
          # Build clear summary: what files changed + commit message
          CHANGED=$(git diff --name-only HEAD~1 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null | head -1)
          SHORTSTAT=$(git diff --shortstat HEAD~1 2>/dev/null)
          AI_SUMMARY=$(cat /tmp/ai-summary.txt 2>/dev/null || echo "")
          SUMMARY="${AI_SUMMARY:-Changed: ${CHANGED:-none}} | ${SHORTSTAT:-no stats} | ${COMMIT_MSG:-no commit}"
          echo "Completion summary: $SUMMARY"
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"completed\",\"pr_url\":\"${{ steps.pr.outputs.pr_url }}\",\"preview_url\":\"${{ steps.preview.outputs.preview_url }}\",\"file_count\":${{ steps.changes.outputs.changes_count }},\"summary\":\"${SUMMARY}\"}" || true

      - name: Notify Fail
        if: failure()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"failed","message":"Workflow failed"}' || true

      - name: Hold Preview
        if: success() && steps.preview.outputs.preview_url != ''
        run: |
          echo "=== LIVE: ${{ steps.preview.outputs.preview_url }} ==="
          sleep 90
