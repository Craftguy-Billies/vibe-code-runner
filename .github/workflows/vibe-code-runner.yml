name: Vibe Code Runner

on:
  workflow_dispatch:
    inputs:
      job_id: { required: true, type: string }
      repo: { required: true, type: string }
      branch: { required: false, type: string, default: 'main' }
      prompt: { required: true, type: string }
      callback_url: { required: true, type: string }
      callback_secret: { required: true, type: string }

jobs:
  vibe-code:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Clone target repo
        env: { GH_PAT: '${{ secrets.GH_PAT }}' }
        run: |
          git clone --branch "${{ inputs.branch }}" --single-branch \
            "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" /tmp/target-repo
          echo "Target repo ready"
          ls -la /tmp/target-repo

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Aider
        run: pip install aider-chat

      - name: Notify Worker - Job Started
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"started","message":"Aider is analyzing your repo..."}' || true

      - name: Run Aider + DeepSeek (with progress capture)
        id: aider
        env:
          OPENAI_API_BASE: https://api.deepseek.com/v1
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ inputs.callback_secret }}
        run: |
          echo "=== AIDER + DEEPSEEK ==="
          echo "Job: ${{ inputs.job_id }}"
          echo "Prompt: ${{ inputs.prompt }}"
          echo "========================="

          cd /tmp/target-repo

          # Run Aider and capture output to log
          aider \
            --yes \
            --model openai/deepseek-chat \
            --message "${{ inputs.prompt }}" \
            --no-suggest-shell-commands \
            2>&1 | tee /tmp/aider-output.log

          AIDER_EXIT=${PIPESTATUS[0]}
          echo "aider_exit=${AIDER_EXIT}"

          # Send progress: what files were changed
          echo ""
          echo "=== CHANGES ==="
          git diff --stat 2>/dev/null || echo "(no changes yet)"

          # Parse Aider output for key events and send as progress
          python3 << 'PYEOF'
          import urllib.request, json, os, re

          callback_url = os.environ['CALLBACK_URL']
          callback_secret = os.environ['CALLBACK_SECRET']

          def notify(msg, file_count=0):
              data = json.dumps({"type":"progress","message":msg,"file_count":file_count}).encode()
              req = urllib.request.Request(callback_url,
                  data=data,
                  headers={'Authorization': f'Bearer {callback_secret}', 'Content-Type': 'application/json'},
                  method='POST')
              try: urllib.request.urlopen(req, timeout=5)
              except: pass

          with open('/tmp/aider-output.log') as f:
              log = f.read()

          lines = log.split('\n')
          for line in lines:
              line = line.strip()
              if not line: continue
              # Capture planning
              if 'scraping' in line.lower() or 'repo-map' in line.lower():
                  notify(f"🔍 {line[:200]}")
              elif 'Creating new file' in line or 'Created' in line and '.py' in line or '.js' in line or '.html' in line or '.css' in line:
                  notify(f"📄 {line[:200]}")
              elif 'Applied edit to' in line:
                  notify(f"✏️ {line[:200]}")
              elif 'Ran ' in line:
                  notify(f"🧪 {line[:200]}")
              elif 'Failed' in line or 'Error' in line or 'error' in line:
                  notify(f"⚠️ {line[:200]}")

          # Send file summary
          import subprocess
          result = subprocess.run(['git', 'diff', '--stat'], capture_output=True, text=True, cwd='/tmp/target-repo')
          if result.stdout.strip():
              notify(f"📊 Files changed:\n{result.stdout.strip()[:500]}")
          PYEOF

      - name: Check changes
        id: changes
        run: |
          cd /tmp/target-repo
          CHANGES=$(git status --porcelain | wc -l)
          echo "changes_count=${CHANGES}" >> $GITHUB_OUTPUT
          if [ "${CHANGES}" -gt 0 ]; then
            echo "=== ${CHANGES} changed files ==="
            git diff --stat
          fi

      - name: Push changes
        if: steps.changes.outputs.changes_count > 0
        id: commit
        env: { GH_PAT: '${{ secrets.GH_PAT }}' }
        run: |
          cd /tmp/target-repo
          BRANCH="vibe-code/job-${{ inputs.job_id }}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "Vibe Code Bot"
          git config user.email "vibe-code-bot@users.noreply.github.com"
          git add -A
          git commit -m "Aider: ${{ inputs.prompt }}" || echo "(no changes)"
          git push "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" "$BRANCH"
          echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT
          echo "Pushed: $BRANCH"

      - name: Start Live Preview (Cloudflare Tunnel)
        id: preview
        run: |
          cd /tmp/target-repo
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          PORT=8080
          if [ -f "package.json" ]; then
            npm install --silent 2>/dev/null || true
            (grep -q '"dev"' package.json && npm run dev -- --port $PORT --host 0.0.0.0 &) || \
            (grep -q '"start"' package.json && PORT=$PORT npm start &) || \
            (npx serve -l $PORT -s . &)
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt --quiet 2>/dev/null || true
            python -m http.server $PORT &
          else
            npx serve -l $PORT -s . &
          fi
          sleep 3
          ./cloudflared tunnel --url http://localhost:$PORT > /tmp/tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "preview_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
            echo "LIVE: $TUNNEL_URL"
          else
            echo "preview_url=" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes_count > 0
        id: pr
        env: { GH_TOKEN: '${{ secrets.GH_PAT }}' }
        run: |
          cd /tmp/target-repo
          PREVIEW_URL="${{ steps.preview.outputs.preview_url }}"
          BODY="## Aider + DeepSeek

          **Prompt:** ${{ inputs.prompt }}"
          if [ -n "$PREVIEW_URL" ]; then
            BODY="${BODY}

          **Live Preview:** ${PREVIEW_URL} (temporary)"
          fi
          PR_URL=$(gh pr create --repo "${{ inputs.repo }}" \
            --head "${{ steps.commit.outputs.branch_name }}" \
            --base "${{ inputs.branch }}" \
            --title "Aider: ${{ inputs.prompt }}" \
            --body "${BODY}" 2>&1)
          echo "PR: ${PR_URL}"
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Notify Worker - Done
        if: success()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"completed\",\"pr_url\":\"${{ steps.pr.outputs.pr_url }}\",\"preview_url\":\"${{ steps.preview.outputs.preview_url }}\",\"file_count\":${{ steps.changes.outputs.changes_count }}}" || true

      - name: Notify Worker - Fail
        if: failure()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"failed","message":"Aider workflow failed. Check run logs."}' || true

      - name: Hold Preview
        if: success() && steps.preview.outputs.preview_url != ''
        run: |
          echo "=== LIVE: ${{ steps.preview.outputs.preview_url }} ==="
          sleep 90
