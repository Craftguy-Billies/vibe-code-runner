name: Vibe Code Runner

on:
  workflow_dispatch:
    inputs:
      job_id: { required: true, type: string }
      repo: { required: true, type: string }
      branch: { required: false, type: string, default: 'main' }
      prompt: { required: true, type: string }
      callback_url: { required: true, type: string }
      callback_secret: { required: true, type: string }

jobs:
  vibe-code:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Clone target repo
        env: { GH_PAT: '${{ secrets.GH_PAT }}' }
        run: |
          git clone --branch "${{ inputs.branch }}" --single-branch \
            "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" /tmp/target-repo
          echo "Target repo ready"
          ls -la /tmp/target-repo

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Aider
        run: pip install aider-chat

      - name: Run Aider + DeepSeek
        env:
          OPENAI_API_BASE: https://api.deepseek.com/v1
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "=== AIDER + DEEPSEEK ==="
          echo "Job: ${{ inputs.job_id }}"
          echo "Prompt: ${{ inputs.prompt }}"

          cd /tmp/target-repo

          aider \
            --yes \
            --model openai/deepseek-chat \
            --message "${{ inputs.prompt }}" \
            --no-suggest-shell-commands

          echo "Aider exit: $?"

      - name: Check changes
        id: changes
        run: |
          cd /tmp/target-repo
          git status --porcelain
          CHANGES=$(git status --porcelain | wc -l)
          echo "changes_count=${CHANGES}" >> $GITHUB_OUTPUT
          if [ "${CHANGES}" -gt 0 ]; then
            echo "=== Changes ==="
            git diff --stat
          fi

      - name: Start Live Preview (Cloudflare Tunnel)
        id: preview
        run: |
          cd /tmp/target-repo
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          PORT=8080
          if [ -f "package.json" ]; then
            npm install --silent 2>/dev/null || true
            (grep -q '"dev"' package.json && npm run dev -- --port $PORT --host 0.0.0.0 &) || \
            (grep -q '"start"' package.json && PORT=$PORT npm start &) || \
            (npx serve -l $PORT -s . &)
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt --quiet 2>/dev/null || true
            python -m http.server $PORT &
          else
            npx serve -l $PORT -s . &
          fi
          sleep 3
          ./cloudflared tunnel --url http://localhost:$PORT > /tmp/tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "preview_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
            echo "LIVE: $TUNNEL_URL"
            echo "$TUNNEL_URL" > /tmp/target-repo/.vibe-preview-url
          else
            echo "preview_url=" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.changes.outputs.changes_count > 0
        id: commit
        env: { GH_PAT: '${{ secrets.GH_PAT }}' }
        run: |
          cd /tmp/target-repo
          BRANCH="vibe-code/job-${{ inputs.job_id }}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git config user.name "Vibe Code Bot"
          git config user.email "vibe-code-bot@users.noreply.github.com"
          git add -A
          git commit -m "Aider: ${{ inputs.prompt }}" || echo "No changes to commit"
          git push "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" "$BRANCH"
          echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changes_count > 0
        id: pr
        env: { GH_TOKEN: '${{ secrets.GH_PAT }}' }
        run: |
          PREVIEW_URL="${{ steps.preview.outputs.preview_url }}"
          BODY="## Aider + DeepSeek

          **Prompt:** ${{ inputs.prompt }}"
          if [ -n "$PREVIEW_URL" ]; then
            BODY="${BODY}

          **Live Preview:** ${PREVIEW_URL} (temporary)"
          fi
          PR_URL=$(gh pr create --repo "${{ inputs.repo }}" \
            --head "${{ steps.commit.outputs.branch_name }}" \
            --base "${{ inputs.branch }}" \
            --title "Aider: ${{ inputs.prompt }}" \
            --body "${BODY}" 2>&1)
          echo "PR: ${PR_URL}"
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Notify Worker
        if: success()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d "{\"success\":true,\"pr_url\":\"${{ steps.pr.outputs.pr_url }}\",\"preview_url\":\"${{ steps.preview.outputs.preview_url }}\",\"summary\":\"Aider + DeepSeek completed\"}" || true

      - name: Notify Worker - Fail
        if: failure()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d '{"success":false,"error":"Aider workflow failed"}' || true

      - name: Hold Preview
        if: success() && steps.preview.outputs.preview_url != ''
        run: |
          echo "=== LIVE: ${{ steps.preview.outputs.preview_url }} ==="
          sleep 90
