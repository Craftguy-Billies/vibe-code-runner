name: Vibe Code Runner

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      repo:
        required: true
        type: string
      branch:
        required: false
        type: string
        default: 'main'
      prompt:
        required: true
        type: string
      model:
        required: false
        type: string
        default: 'deepseek-v4-flash'
      clear_history:
        required: false
        type: string
        default: 'false'
      callback_url:
        required: true
        type: string
      callback_secret:
        required: true
        type: string

jobs:
  vibe-code:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Clone target repo
        env: { GH_PAT: '${{ secrets.GH_PAT }}' }
        run: |
          git clone --branch "${{ inputs.branch }}" --single-branch \
            "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" /tmp/target-repo
          ls /tmp/target-repo

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Aider
        run: pip install aider-chat

      - name: Clear history (if /newchat)
        if: inputs.clear_history == 'true'
        run: |
          cd /tmp/target-repo
          rm -f .aider.chat.history.md .aider.input.history
          echo "History cleared"

      - name: Web Search (Tavily primary, DuckDuckGo fallback)
        id: websearch
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          QUERY="${{ inputs.prompt }}"
          echo "=== WEB SEARCH: ${QUERY:0:150} ==="

          SEARCH_RESULTS=""

          # Try Tavily first (AI-optimized search)
          if [ -n "$TAVILY_API_KEY" ]; then
            echo "Trying Tavily..."
            TAVILY_RESP=$(curl -s -X POST "https://api.tavily.com/search" \
              -H "Content-Type: application/json" \
              -d "{\"api_key\":\"$TAVILY_API_KEY\",\"query\":\"$QUERY\",\"search_depth\":\"basic\",\"max_results\":5}" 2>&1)
            if echo "$TAVILY_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('results',[]))" 2>/dev/null; then
              SEARCH_RESULTS=$(echo "$TAVILY_RESP" | python3 -c "
import sys,json
d = json.load(sys.stdin)
for i, r in enumerate(d.get('results',[])[:5]):
    print(f'{i+1}. {r.get(\"title\",\"\")}')
    print(f'   {r.get(\"url\",\"\")}')
    print(f'   {r.get(\"content\",\"\")[:200]}')
    print()
")
              echo "Tavily: found $(echo "$SEARCH_RESULTS" | grep -c '^[0-9]') results"
            else
              echo "Tavily failed, response: ${TAVILY_RESP:0:200}"
            fi
          fi

          # Fallback to DuckDuckGo
          if [ -z "$SEARCH_RESULTS" ]; then
            echo "Falling back to DuckDuckGo..."
            ENCODED_Q=$(echo "$QUERY" | python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read()[:200]))")
            SEARCH_RESULTS=$(curl -s "https://html.duckduckgo.com/html/?q=$ENCODED_Q" \
              -H "User-Agent: vibe-code-bot/1.0" | python3 -c "
import sys, re, html as h
text = sys.stdin.read()
results = []
for m in re.finditer(r'<a[^>]*class=\"result__a\"[^>]*href=\"([^\"]+)\"[^>]*>([^<]+)</a>', text):
    results.append({'url': m.group(1), 'title': h.unescape(m.group(2).strip())})
snippets = re.findall(r'<a[^>]*class=\"result__snippet\"[^>]*>(.*?)</a>', text)
for i, s in enumerate(snippets[:len(results)]):
    results[i]['snippet'] = h.unescape(re.sub(r'<[^>]+>', '', s)).strip()
for i, r in enumerate(results[:5]):
    print(f'{i+1}. {r[\"title\"]}')
    print(f'   {r[\"url\"]}')
    print(f'   {r.get(\"snippet\",\"\")[:200]}')
    print()
")
          fi

          if [ -n "$SEARCH_RESULTS" ]; then
            echo "$SEARCH_RESULTS" > /tmp/web-results.txt
            echo "=== WEB RESULTS ==="
            cat /tmp/web-results.txt
          else
            echo "(no web results)"
          fi

      - name: Notify - Started
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"started\",\"message\":\"🤖 Aider (${{ inputs.model }}) starting...\"}" || true

      - name: Run Aider + DeepSeek
        id: aider
        env:
          OPENAI_API_BASE: https://api.deepseek.com/v1
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CB_URL: ${{ inputs.callback_url }}
          CB_SECRET: ${{ inputs.callback_secret }}
        run: |
          cd /tmp/target-repo

          # Build prompt with web search results
          MSG="${{ inputs.prompt }}"
          if [ -f /tmp/web-results.txt ] && [ -s /tmp/web-results.txt ]; then
            MSG="${MSG}\n\nWeb search results that may help:\n$(cat /tmp/web-results.txt)"
          fi

          aider --yes --model openai/${{ inputs.model }} --message "$MSG" --no-suggest-shell-commands 2>&1 | tee /tmp/aider.log

          # Parse and send progress
          python3 << 'PYEOF'
          import urllib.request, json, os, subprocess, re
          cb, cs = os.environ['CB_URL'], os.environ['CB_SECRET']
          def notify(msg):
              try:
                  d = json.dumps({"type":"progress","message":msg[:550]}).encode()
                  r = urllib.request.Request(cb, data=d, headers={'Authorization':f'Bearer {cs}','Content-Type':'application/json'}, method='POST')
                  urllib.request.urlopen(r, timeout=5)
              except: pass

          with open('/tmp/aider.log') as f:
              log = re.sub(r'[━┃┏┓┗┛┣┫┳┻╋╭╮╰╯│─▐▌▀▄█]','',f.read())

          sent = 0
          for line in log.split('\n'):
              s = line.strip()
              if not s or len(s) < 5: continue
              if s.startswith('    ') or s.startswith('Traceback'): continue
              if 'File "' in s and 'line' in s: continue
              if any(c in s for c in '╭╰━━'): continue

              prefix = ""
              if any(w in s for w in ['Creating','Created','Wrote','Modified','write','create']): prefix = "📄 "
              elif any(w in s for w in ['Applied','Edited','edit','patch']): prefix = "✏️ "
              elif any(w in s for w in ['scraping','repo-map','map','context']): prefix = "🔍 "
              elif any(w in s for w in ['Ran','test','Test','run','python','pytest']): prefix = "🧪 "
              elif any(w in s for w in ['error','Error','Failed','fail']): prefix = "⚠️ "
              elif any(w in s for w in ['commit','Commit','committed']): prefix = "💾 "
              elif any(w in s for w in ['diff','Diff','change']): prefix = "📊 "
              elif any(w in s for w in ['model','Model','token','Token','cost']): prefix = "💰 "
              elif any(w in s for w in ['Aider','aider']): prefix = "🤖 "

              notify(f"{prefix}{s}")
              sent += 1
              if sent >= 20: break

          r = subprocess.run(['git','diff','--stat'], capture_output=True, text=True, cwd='/tmp/target-repo')
          if r.stdout.strip():
              notify(f"📊 Diff:\n{r.stdout.strip()[:450]}")
          r2 = subprocess.run(['git','diff','--name-only'], capture_output=True, text=True, cwd='/tmp/target-repo')
          if r2.stdout.strip():
              files = r2.stdout.strip().split('\n')
              notify(f"📁 Files ({len(files)}):\n" + '\n'.join(f'  • {f}' for f in files[:15]))
          PYEOF

      - name: Check changes
        id: changes
        run: |
          cd /tmp/target-repo
          CHANGES=$(git status --porcelain | wc -l)
          echo "changes_count=${CHANGES}" >> $GITHUB_OUTPUT
          if [ "${CHANGES}" -gt 0 ]; then git diff --stat; fi

      - name: Push changes
        if: steps.changes.outputs.changes_count > 0
        id: commit
        env: { GH_PAT: '${{ secrets.GH_PAT }}' }
        run: |
          cd /tmp/target-repo
          B="vibe-code/job-${{ inputs.job_id }}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$B"
          git config user.name "Vibe Code Bot"
          git config user.email "vibe-code-bot@users.noreply.github.com"
          git add -A
          git commit -m "Aider: ${{ inputs.prompt }}" || echo "(no changes)"
          git push "https://x-access-token:${GH_PAT}@github.com/${{ inputs.repo }}.git" "$B"
          echo "branch_name=$B" >> $GITHUB_OUTPUT

      - name: Start Live Preview
        id: preview
        continue-on-error: true
        run: |
          cd /tmp/target-repo
          npm install -g serve 2>/dev/null || true
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          PORT=8080
          (nohup serve -l $PORT -s . > /tmp/srv.log 2>&1 &)
          sleep 3
          (./cloudflared tunnel --url http://localhost:$PORT > /tmp/tun.log 2>&1 &)
          sleep 6
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tun.log | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "preview_url=$TUNNEL_URL" >> $GITHUB_OUTPUT
            echo "LIVE: $TUNNEL_URL"
          else
            echo "preview_url=" >> $GITHUB_OUTPUT
            echo "Tunnel log:"; cat /tmp/tun.log
            echo "Server log:"; cat /tmp/srv.log
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changes_count > 0
        id: pr
        env: { GH_TOKEN: '${{ secrets.GH_PAT }}' }
        run: |
          cd /tmp/target-repo
          PREVIEW_URL="${{ steps.preview.outputs.preview_url }}"
          BODY="## Aider + DeepSeek (${{ inputs.model }})\n\n**Prompt:** ${{ inputs.prompt }}"
          if [ -n "$PREVIEW_URL" ]; then
            BODY="${BODY}\n\n**Live Preview:** ${PREVIEW_URL}"
          fi
          PR_URL=$(gh pr create --repo "${{ inputs.repo }}" --head "${{ steps.commit.outputs.branch_name }}" --base "${{ inputs.branch }}" --title "Aider: ${{ inputs.prompt }}" --body "$(echo -e "${BODY}")" 2>&1)
          echo "PR: ${PR_URL}"
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Notify - Done
        if: success()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"completed\",\"pr_url\":\"${{ steps.pr.outputs.pr_url }}\",\"preview_url\":\"${{ steps.preview.outputs.preview_url }}\",\"file_count\":${{ steps.changes.outputs.changes_count }}}" || true

      - name: Notify - Fail
        if: failure()
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ inputs.callback_secret }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"failed","message":"Aider workflow failed. Check GitHub Actions logs."}' || true

      - name: Hold Preview
        if: success() && steps.preview.outputs.preview_url != ''
        run: |
          echo "=== LIVE: ${{ steps.preview.outputs.preview_url }} ==="
          sleep 90
